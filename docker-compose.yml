version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: securemail
      POSTGRES_USER: securemail
      POSTGRES_PASSWORD: securemail
    ports:
      - "5432:5432"
    volumes:
      - securemail_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ai-agent:
    build:
      context: .
      dockerfile: ai_agent/Dockerfile
    environment:
      SECUREMAIL_AI_AGENT_PROVIDER: gemini
      SECUREMAIL_AI_AGENT_GOOGLE_AI_STUDIO_API_KEY: ${SECUREMAIL_AI_AGENT_GOOGLE_AI_STUDIO_API_KEY:-}
      SECUREMAIL_AI_AGENT_GOOGLE_AI_STUDIO_MODEL: ${SECUREMAIL_AI_AGENT_GOOGLE_AI_STUDIO_MODEL:-gemini-3.1-flash-lite-preview}
    ports:
      - "8003:8003"
    depends_on:
      - redis

volumes:
  securemail_pg_data:
