services:
  postgres:
    image: postgres:16-alpine
    container_name: securemail-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securemail}
      POSTGRES_USER: ${POSTGRES_USER:-securemail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securemail}
      POSTGRES_INITDB_ARGS: "-c log_replication_commands=off"
    ports:
      - "5432:5432"
    volumes:
      - securemail_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securemail} -d ${POSTGRES_DB:-securemail}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - securemail-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securemail-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECUREMAIL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securemail}:${POSTGRES_PASSWORD:-securemail}@postgres:5432/${POSTGRES_DB:-securemail}
      # Use service names for internal Docker communication
      SECUREMAIL_EMAIL_AGENT_URL: ${SECUREMAIL_EMAIL_AGENT_URL:-http://host.docker.internal:8000}
      SECUREMAIL_FILE_AGENT_URL: ${SECUREMAIL_FILE_AGENT_URL:-http://host.docker.internal:8001}
      SECUREMAIL_WEB_AGENT_URL: ${SECUREMAIL_WEB_AGENT_URL:-http://host.docker.internal:8002}
      SECUREMAIL_AI_AGENT_URL: ${SECUREMAIL_AI_AGENT_URL:-http://host.docker.internal:8003}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/db/data/lists:/app/src/db/data/lists
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    restart: unless-stopped
    networks:
      - securemail-net

volumes:
  securemail_pg_data:
    driver: local

networks:
  securemail-net:
    driver: bridge
